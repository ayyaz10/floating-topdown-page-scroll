<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 280px;
      background: linear-gradient(135deg, #1e1e2e 0%, #2d2d3d 100%);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
    }
    .container {
      padding: 16px;
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding-bottom: 10px;
    }
    .header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }
    .setting-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.9);
    }
    input[type="color"] {
      width: 100%;
      height: 40px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .slider-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    input[type="range"] {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.2);
      outline: none;
      -webkit-appearance: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(100, 150, 255, 0.8);
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(100, 150, 255, 0.8);
      cursor: pointer;
      border: none;
    }
    .opacity-value {
      font-size: 12px;
      min-width: 30px;
      text-align: right;
      color: rgba(255, 255, 255, 0.7);
    }
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    .reset-btn {
      background: rgba(100, 100, 100, 0.8);
      color: white;
    }
    .reset-btn:hover {
      background: rgba(120, 120, 120, 0.9);
    }
    .close-btn {
      background: rgba(70, 70, 70, 0.8);
      color: white;
    }
    .close-btn:hover {
      background: rgba(90, 90, 90, 0.9);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⬆️ ⬇️ Scroll Settings</h1>
    </div>

    <div class="setting-group">
      <label for="bgColor">Background Color</label>
      <input type="color" id="bgColor" value="#000000">
    </div>

    <div class="setting-group">
      <label for="textColor">Arrow Color</label>
      <input type="color" id="textColor" value="#ffffff">
    </div>

    <div class="setting-group">
      <label for="opacity">Opacity</label>
      <div class="slider-container">
        <input type="range" id="opacity" min="0" max="100" value="70">
        <span class="opacity-value" id="opacityValue">70%</span>
      </div>
    </div>

    <div class="button-group">
      <button class="reset-btn" id="resetBtn">Reset</button>
      <button class="close-btn" id="closeBtn">Close</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
